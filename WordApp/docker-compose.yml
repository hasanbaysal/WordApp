services:
  wordapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wordapp
    restart: unless-stopped
    network_mode: "host"
    environment:
      # PostgreSQL artık host'ta — sunucunun localhost'una bağlanır
      #- ConnectionStrings__DefaultConnection=Host=host.docker.internal;Database=WordDb;Username=wordapp_user;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=WordDb;Username=wordapp_user;Password=${POSTGRES_PASSWORD}
      # Admin ayarları
      - AdminSettings__Username=${ADMIN_USERNAME}
      - AdminSettings__Password=${ADMIN_PASSWORD}
      - AdminSettings__Email=${ADMIN_EMAIL}
      # Yandex SMTP
      - YandexSmtpSettings__Host=smtp.yandex.com
      - YandexSmtpSettings__Port=587
      - YandexSmtpSettings__Username=${YANDEX_USERNAME}
      - YandexSmtpSettings__Password=${YANDEX_PASSWORD}
      # Ntfy bildirimleri
      - NtfySettings__TopicUrl=${NTFY_TOPIC_URL}
      - NtfySettings__Enabled=true
      - ASPNETCORE_ENVIRONMENT=Production
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux'ta host IP'ye erişim
    ports:
      - "127.0.0.1:5000:5000"   # Sadece localhost (Nginx proxy)
    networks:
      - wordapp_net

networks:
  wordapp_net:
    driver: bridge
