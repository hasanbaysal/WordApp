name: Deploy WordApp

on:
  push:
    branches:
      - main          # main branch'e push olduğunda tetikle

jobs:
  deploy:
    name: Sunucuya Deploy Et
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Kodu Checkout Et
        uses: actions/checkout@v4

      # 2. Sunucuya SSH ile bağlan ve deploy işlemlerini yap
      - name: Sunucuya SSH Bağlan ve Deploy Et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Proje dizinine git (ilk deployta yoksa oluştur)
            mkdir -p /opt/wordapp
            cd /opt/wordapp

            # Repoyu güncelle (yoksa klonla)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            # .env dosyasını GitHub Secrets'tan oluştur/güncelle
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            YANDEX_USERNAME=${{ secrets.YANDEX_USERNAME }}
            YANDEX_PASSWORD=${{ secrets.YANDEX_PASSWORD }}
            NTFY_TOPIC_URL=${{ secrets.NTFY_TOPIC_URL }}
            ENVEOF

            # .env dosyasının izinlerini kısıtla (sadece sahibi okusun)
            chmod 600 .env

            # Docker container'ı yeniden oluştur ve başlat
            docker compose -f WordApp/docker-compose.yml up -d --build

            # Eski Docker imajlarını temizle (disk dolmasın)
            docker image prune -f

            echo "Deploy tamamlandı!"
