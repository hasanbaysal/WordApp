name: Deploy WordApp

on:
  push:
    branches:
      - main          # main branch'e push olduğunda tetikle

jobs:
  deploy:
    name: Sunucuya Deploy Et
    runs-on: ubuntu-latest

    steps:
      
      - name: Kodu Checkout Et
        uses: actions/checkout@v4

      
      - name: Sunucuya SSH Bağlan ve Deploy Et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            
            mkdir -p /opt/wordapp
            cd /opt/wordapp

            
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

           
            cd WordApp

            
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            YANDEX_USERNAME=${{ secrets.YANDEX_USERNAME }}
            YANDEX_PASSWORD=${{ secrets.YANDEX_PASSWORD }}
            NTFY_TOPIC_URL=${{ secrets.NTFY_TOPIC_URL }}
            ENVEOF

            chmod 600 .env

           
            docker compose up -d --build

            
            docker image prune -f

            echo "Deploy tamamlandı!"